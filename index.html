<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>古籍 Online Editor - 基础版</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>古籍 Online Editor</h1>
      <div class="topbar-actions">
        <input id="uploadInput" type="file" accept="image/*" class="hidden" />
        <button id="uploadBtn" class="primary">添加图片</button>
      </div>
    </header>

    <main class="layout">
      <aside class="left-panel">
        <div class="panel-title">概览</div>
        <div id="thumbList" class="thumb-list"></div>
      </aside>

      <section class="center-panel">
        <div class="viewer-head">
          <div id="viewerTitle">未选择图片</div>
          <div class="hint">先在右侧选择标签和画框样式，再进入画框模式</div>
        </div>
        <div id="canvasWrap" class="canvas-wrap">
          <img id="mainImage" alt="主编辑图" draggable="false" />
          <div id="drawLayer" class="draw-layer"></div>
        </div>
      </section>

      <aside class="right-panel">
        <div class="panel-title">编辑面板</div>

        <div class="section">
          <div class="section-title">1. 当前对象属性</div>
          <div id="currentTargetHint" class="muted">当前：图片</div>
          <label>ID
            <input id="propId" type="text" placeholder="id" />
          </label>
          <label>Type
            <input id="propType" type="text" placeholder="type" />
          </label>
          <label>Version
            <input id="propVersion" type="text" placeholder="version" />
          </label>
          <label>注释(可选)
            <textarea id="propNote" rows="2" placeholder="对象注释"></textarea>
          </label>
          <button id="saveCurrentPropsBtn">保存当前对象属性</button>
        </div>

        <div class="section">
          <div class="section-title">2. 画框模式</div>
          <div id="drawState" class="muted">先选择标签与样式，再点击进入画框模式</div>
          <div class="row-actions single-bottom-gap">
            <button id="toggleDrawModeBtn" class="primary">进入画框模式</button>
            <button id="clearDraftBtn">清空草稿</button>
          </div>
          <label>样式形状
            <select id="annoShapeSelect">
              <option value="rect">方框</option>
              <option value="line">横线</option>
              <option value="wave">波浪线</option>
            </select>
          </label>
          <label>样式颜色
            <input id="annoColor" type="color" value="#2e6f86" />
          </label>
          <div class="picker-title">树状选择标签</div>
          <div id="tagPickerTree" class="tag-tree picker"></div>
          <div id="selectedTagInfo" class="muted">未选择标签</div>
          <label>简体转写
            <input id="annoTranscription" type="text" placeholder="输入简体字/文本" />
          </label>
          <label>注释(可选)
            <textarea id="annoNote" rows="3" placeholder="输入注释"></textarea>
          </label>
          <button id="saveAnnoBtn" class="primary">保存标注</button>
        </div>

        <div class="section">
          <div class="section-title">3. 标签树（标签+属性）</div>
          <div id="tagTree" class="tag-tree"></div>
          <label>标签名称
            <input id="newTagName" type="text" placeholder="例如：line / note / customTag" />
          </label>
          <label>插入到父标签
            <select id="newTagParent"></select>
          </label>
          <label>属性(逗号分隔)
            <input id="newTagAttrs" type="text" placeholder="例如：id,type,version" />
          </label>
          <button id="addTagBtn">新增标签</button>
        </div>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
