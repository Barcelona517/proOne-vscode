<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>古籍 Online Editor - 基础版</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>古籍 Online Editor</h1>
      <div class="topbar-actions">
        <input id="uploadInput" type="file" accept="image/*" class="hidden" />
        <button id="uploadBtn" class="primary">添加图片</button>
      </div>
    </header>

    <main class="layout">
      <aside class="left-panel">
        <div class="panel-title with-action">
          <span>概览</span>
          <button id="deleteSelectedImagesBtn" class="mini-btn" type="button">批量删除</button>
        </div>
        <div id="thumbList" class="thumb-list"></div>
      </aside>

      <section class="center-panel">
        <div class="viewer-head">
          <div id="viewerTitle">未选择图片</div>
        </div>
        <div id="canvasWrap" class="canvas-wrap">
          <img id="mainImage" alt="主编辑图" draggable="false" />
          <div id="drawLayer" class="draw-layer"></div>
        </div>
      </section>

      <aside class="right-panel">
        <div class="panel-title">编辑面板</div>

        <div class="section">
          <div class="section-title">1. 当前对象属性</div>
          <div id="currentTargetHint" class="muted">当前：图片</div>
          <div id="propsEditor"></div>
          <label>注释(可选)
            <textarea id="propNote" rows="2" placeholder="对象注释"></textarea>
          </label>
          <button id="saveCurrentPropsBtn">保存当前对象属性</button>
        </div>

        <div class="section">
          <div class="section-title">2. 画框模式</div>
          <div id="editModeArea">
            <div id="drawState" class="muted">编辑模式已开启</div>
            <div class="row-actions single-bottom-gap">
              <button id="startDrawBtn" class="primary">开始添加</button>
              <button id="clearDraftBtn">清空草稿</button>
            </div>
            <label>样式形状
              <select id="annoShapeSelect">
                <option value="rect">方框</option>
                <option value="line">横线</option>
                <option value="wave">波浪线</option>
              </select>
            </label>
            <label>样式颜色
              <div class="color-inline-row">
                <input id="annoColor" type="color" value="#2e6f86" />
                <button id="annoColorPreview" class="color-preview-btn" type="button">改变颜色</button>
              </div>
              <div id="annoColorHint" class="muted">请选择颜色</div>
            </label>

            <div class="picker-title">选择标签（模板树）</div>
            <div id="tagPickerTree" class="tag-tree picker"></div>
            <div id="selectedTagInfo" class="muted">未选择标签</div>

            <details class="add-tag-box">
              <summary>或新增标签后使用</summary>
              <label>新标签名称
                <input id="draftTagName" type="text" placeholder="例如：chapter / line / note" />
              </label>
              <label>父标签
                <select id="draftTagParent"></select>
              </label>
              <label>标签属性(逗号分隔)
                <input id="draftTagAttrs" type="text" placeholder="例如：id,type,version" />
              </label>
              <label class="check-line">
                <input id="addDraftTagToTemplate" type="checkbox" checked />
                <span>加入模板树</span>
              </label>
              <button id="createDraftTagBtn">创建并选择该标签</button>
            </details>

            <label>简体转写
              <input id="annoTranscription" type="text" placeholder="输入简体字/文本" />
            </label>
            <label>注释(可选)
              <textarea id="annoNote" rows="3" placeholder="输入注释"></textarea>
            </label>
            <button id="saveAnnoBtn" class="primary">保存标注</button>
          </div>
        </div>

        <div class="section">
          <div class="section-title with-action">
            <span>3. 标签树</span>
            <button id="toggleTemplateTreeBtn" class="mini-btn" type="button">模板树</button>
          </div>
          <div class="picker-title">当前图片标签树（点击标签高亮对应框线）</div>
          <div id="imageTagTree" class="tag-tree"></div>

          <div id="templateTreeArea" class="hidden-block">
            <div class="picker-title">模板树（标签+属性，可增删改排）</div>
            <div id="templateTagTree" class="tag-tree"></div>

          <label>选择模板标签
            <select id="templateTagSelect"></select>
          </label>
          <div class="row-actions">
            <button id="tagMoveUpBtn">同级上移</button>
            <button id="tagMoveDownBtn">同级下移</button>
          </div>
          <button id="deleteTagBtn">删除模板标签</button>

          <label>为模板标签新增属性
            <div class="inline-action-row">
              <input id="newAttrForTemplateTag" type="text" placeholder="属性名，例如：id" />
              <button id="addAttrBtn" class="compact-btn" type="button">新增属性</button>
            </div>
          </label>
          <label>删除模板标签属性
            <div class="inline-action-row">
              <select id="templateAttrSelect"></select>
              <button id="deleteAttrBtn" class="compact-btn" type="button">删除属性</button>
            </div>
          </label>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
